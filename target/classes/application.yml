server:
  port: 8080

spring:
  application:
    name: hce-fms
  
  datasource:
    url: jdbc:postgresql://localhost:5432/hce_fms
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  level:
    com.hce.fms: DEBUG
    org.springframework.security: DEBUG
